# q-pick-today 一键当日选股 + 深度推理 + 推送

# 模板列表 (litong 已停用 — 用户决定: 太多符合无区分度)
templates:
  - yunnange   # 80d 胜率 78%, 平均 +31%
  - lanqi      # 80d 胜率 55%, 平均 +17%
  - hongjing   # 80d 胜率 56%, 平均 +19% (dist<5)
  - fujing     # 80d 胜率 49%, 平均 +31%
  - xiangnong  # 80d 胜率 89%, 平均 +61% (dist<5, n小)
  # - litong   # 已停用

# 科创/创业板平台突破策略 (新增，替代 litong)
kechuang:
  enabled: true
  strategy: "kechuang_breakout"   # core/strategies/kechuang_breakout.py
  min_score: 4                    # 最低评分 (3=基础, 4=低振幅/强放量)
  top_n: 5                        # 每次最多推送 N 只

# 数据路径
data:
  windows_dir_pattern: "/mnt/c/Users/201744672/Downloads/hsjday{mmdd}"   # 用户每天放今日数据的文件夹
  local_tdx: "/home/wyatt/sentry/quant/data/tdx"
  backup_tdx: "/home/wyatt/sentry/quant/data/backup/tdx"

# 命令路径
commands:
  q_backtest_fast: "/home/wyatt/sentry/quant/q-backtest/q-backtest-fast"
  q_fin: "/home/wyatt/sentry/quant/q-fin/q-fin"
  q_push: "/home/wyatt/sentry/quant/q-push/q-push"

# q-fin 深度调研策略
q_fin:
  enabled: true
  budget_per_stock: 0.15                # 每只 $0.15 上限
  daily_total_budget: 1.00              # 每日总预算上限 $1
  max_depth: 3                           # 用户要求 3 层递归
  threshold_stars: 4                    # 仅 ★★★★+ 调 q-fin (省 token)

# 评级阈值 (dist + 模板 win80 联合)
star_thresholds:
  - {min_stars: 5, max_dist: 5.0, min_win80: 0.50}
  - {min_stars: 4, max_dist: 7.0, min_win80: 0.45}
  - {min_stars: 3, max_dist: 10.0, min_win80: 0.0}
  - {min_stars: 2, max_dist: 15.0, min_win80: 0.0}

# 推送
push:
  one_msg_per_stock: true               # 每股一条消息 (用户要求)
  disclaimer: |
    ⚠️ 风险提示: 以上仅供研究参考, 不构成任何投资建议. 股市有风险, 投资需谨慎.
    策略基于历史回测, 过往表现不代表未来收益. 任何买卖决策请独立判断, 自行承担风险.
