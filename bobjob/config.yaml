# 短线尾盘买早盘卖策略配置

strategy:
  name: "尾盘买早盘卖"
  description: "下午2:30-2:50选缩量阴线回调10日线的活跃票，次日早盘卖出"
  
  # 选股时间窗口
  selection_time:
    start: "14:30"  # 下午2:30
    end: "14:50"    # 下午2:50
  
  # 选股条件
  selection_criteria:
    # 1. 缩量阴线
    volume_shrink_ratio: 0.7  # 成交量 < 前5日均量 * 0.7
    is_red_candle: false      # 必须是阴线 (close < open)
    
    # 2. 回调到10日线
    ma10_distance_min: -0.02  # 距离10日线 >= -2%
    ma10_distance_max: 0.01   # 距离10日线 <= +1%
    
    # 3. 前期活跃
    active_days: 20           # 前20天
    active_volume_ratio: 1.5  # 至少有5天成交量 > 均量 * 1.5
    active_min_days: 5
    
    # 4. 价格区间
    price_min: 5.0            # 最低价格
    price_max: 100.0          # 最高价格
    
    # 5. 排除条件
    exclude_st: true          # 排除ST股票
    exclude_new_stock_days: 60  # 排除上市60天内新股
  
  # 次日卖出规则
  exit_rules:
    # 低开破线立即卖
    low_open_threshold: -0.01  # 开盘价 < 昨收 * 0.99
    break_ma10_sell: true      # 破10日线卖出
    
    # 平开/高开卖出时机
    sell_time_morning: "10:00"  # 10点左右
    sell_on_peak: true          # 冲高卖出
    sell_on_break_vwap: true    # 破分时均线卖出
    
    # 最大持有期
    max_hold_days: 2           # 最多持有2天

# 回测参数
backtest:
  start_date: "2024-01-01"
  end_date: "2026-04-28"
  initial_capital: 100000     # 初始资金10万
  max_positions: 5            # 最多持仓5只
  commission_rate: 0.0003     # 佣金万3
  slippage_rate: 0.001        # 滑点0.1%
  
  # 报告输出
  output_dir: "./logs"
  report_format: ["csv", "md"]

# 数据源
data:
  tdx_dir: "/home/wyatt/bob/sentry/quant/data/tdx"
  stock_names_csv: "/home/wyatt/bob/sentry/quant/data/stock_names.csv"
