# 短线尾盘买早盘卖策略配置 - 完整回测版本

strategy:
  name: "尾盘买早盘卖"
  description: "下午2:30-2:50选缩量阴线回调10日线的活跃票，次日早盘卖出"
  
  selection_time:
    start: "14:30"
    end: "14:50"
  
  # 选股条件（适度放宽以获得更多样本）
  selection_criteria:
    volume_shrink_ratio: 0.8  # 放宽到0.8（原0.7）
    is_red_candle: false
    ma10_distance_min: -0.03  # 放宽到-3%（原-2%）
    ma10_distance_max: 0.02   # 放宽到+2%（原+1%）
    active_days: 20
    active_volume_ratio: 1.3  # 降低到1.3（原1.5）
    active_min_days: 4        # 降低到4天（原5天）
    price_min: 5.0
    price_max: 100.0
    exclude_st: true
    exclude_new_stock_days: 60
  
  exit_rules:
    low_open_threshold: -0.01
    break_ma10_sell: true
    sell_time_morning: "10:00"
    sell_on_peak: true
    sell_on_break_vwap: true
    max_hold_days: 2

# 回测参数 - 完整版本（1年，500只活跃股票）
backtest:
  start_date: "2025-01-01"  # 1年多数据
  end_date: "2026-04-28"
  initial_capital: 100000
  max_positions: 5
  commission_rate: 0.0003
  slippage_rate: 0.001
  max_symbols: 500  # 500只活跃股票
  output_dir: "./logs"
  report_format: ["csv", "md"]

data:
  tdx_dir: "/home/wyatt/bob/sentry/quant/data/tdx"
  stock_names_csv: "/home/wyatt/bob/sentry/quant/data/stock_names.csv"
