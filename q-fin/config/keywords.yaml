# q-fin Layer 1 关键词库
# 用户可自由增减/调整 severity. 改 yaml 不需要改代码.

events:
  控制权变更:
    patterns:
      - "控制权变更"
      - "实际控制人变更"
      - "要约收购"
      - "协议转让"
      - "股份转让协议"
      - "实控人变更"
    severity: 5
    category: "借壳类"

  借壳重组:
    patterns:
      - "重大资产重组"
      - "发行股份购买资产"
      - "资产置换"
      - "借壳上市"
      - "作价购买"
      - "资产注入"
    severity: 5
    category: "借壳类"

  主业转型:
    patterns:
      - "经营范围变更"
      - "经营范围"
      - "新增业务"
      - "公司名称变更"
      - "证券简称变更"
      - "主营业务调整"
    severity: 3
    category: "转型类"

  跨界布局:
    patterns:
      - "设立子公司"
      - "战略合作"
      - "收购子公司"
      - "外延并购"
    severity: 2
    category: "转型类"
    noise_filter: true

  股东大额变动:
    patterns:
      - "5%以上股东"
      - "持股变动"
      - "增持"
      - "减持完成"
    severity: 2
    category: "股东类"

# 股东变动阈值
shareholders:
  large_new_entry_pct: 0.05         # >= 5% 算大额新进
  first_new_entry_pct: 0.10         # >= 10% 算潜在借壳
  partnership_weight: 1.5           # 合伙企业产业资本加权

# 8 方向 tag (命中关键词加 tag)
hot_tags:
  AI:
    - "AI"
    - "人工智能"
    - "大模型"
  算力:
    - "算力"
    - "GPU"
    - "服务器"
    - "IDC"
    - "液冷"
    - "智算"
  半导体:
    - "芯片"
    - "半导体"
    - "模拟芯片"
    - "存储"
    - "EDA"
  机器人:
    - "人形机器人"
    - "机器人"
    - "具身智能"
    - "扫地机器人"
  商业航天:
    - "卫星"
    - "火箭"
    - "商业航天"
    - "遥感"
  创新药:
    - "创新药"
    - "ADC"
    - "PD-1"
    - "单抗"
  稀土:
    - "稀土"
    - "磁材"
    - "钕铁硼"
  贵金属:
    - "黄金"
    - "白银"
    - "铂金"

# 排除规则
exclusions:
  st_filter:
    name_contains: ["ST", "*ST", "退"]
    severity_downgrade: 1
  noise_titles:
    - "更正公告"
    - "关于公告的更正"
    - "关于召开"
    - "关于参加"
